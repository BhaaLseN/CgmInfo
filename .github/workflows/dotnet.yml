name: .NET

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Publish GUI executable
        run: dotnet publish CgmInfoGui/CgmInfoGui.csproj --configuration Release --output ./publish
      - name: Upload latest build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v5
        with:
          name: latest-build
          path: ./publish
          retention-days: 7
